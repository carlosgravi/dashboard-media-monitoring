name: Testar Extrator Organico (temporario)

on:
  workflow_dispatch:

jobs:
  testar-organico:
    runs-on: ubuntu-latest

    env:
      META_ADS_ACCESS_TOKEN: ${{ secrets.META_ADS_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Extrair Organico (ultimos 90 dias)
        run: python scripts/extrair_organico.py --dias 90

      - name: Mostrar resultados
        run: |
          echo "=== Arquivos gerados ==="
          ls -la Dados/Organico/ || echo "Pasta nao criada"
          echo ""
          echo "=== Primeiras linhas de cada CSV ==="
          for f in Dados/Organico/*.csv; do
            echo "--- $f ---"
            head -5 "$f" 2>/dev/null || echo "vazio"
            echo ""
          done
